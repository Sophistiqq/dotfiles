[colors]
foreground = #2F3A33
foreground-alt = #4A5A52
background = #F4F7F3
background-alt = #E8EEE9
primary = #5FA777
secondary = #8FB3A2
alert = #D96C6C
disabled = #9AA6A0

[bar/main]
width = 100%
height = 25px
radius = 0
background = ${colors.background}
foreground = ${colors.foreground}
line-size = 2pt
border-size = 0pt
border-color = #00000000
padding-left = 1
padding-right = 1
module-margin = 1
separator = 
separator-foreground = ${colors.disabled}
font-0 = "Nikkyou Sans:size=9"
modules-left = rofi i3 xwindow
modules-center = date
modules-right = network pulseaudio memory temperature  record redshift brightness menu-power
cursor-click = pointer
cursor-scroll = ns-resize
enable-ipc = true

[module/i3]
type = internal/i3
pin-workspaces = true
strip-wsnumbers = true
index-sort = true
enable-click = true
enable-scroll = true
wrapping-scroll = false
fuzzy-match = true
format =  <label-state> <label-mode>
label-mode = %mode%
label-mode-padding = 2
label-mode-background = ${colors.primary}
label-focused = %name%
label-focused-background = ${colors.background-alt}
label-focused-underline= ${colors.primary}
label-focused-padding = 2
label-unfocused = %name%
label-unfocused-padding = 2
label-visible = %name%
label-visible-background = ${colors.background-alt}
label-visible-underline = ${colors.secondary}
label-visible-padding = 2
label-urgent = %name%
label-urgent-background = ${colors.alert}
label-urgent-padding = 2

[module/xwindow]
type = internal/xwindow
label = %title:0:60:...%

[module/filesystem]
type = internal/fs
interval = 25
mount-0 = /
label-mounted = %{F#bd93f9}%{F-} %percentage_free%%
label-unmounted = %mountpoint% not mounted
label-unmounted-foreground = ${colors.disabled}

[module/pulseaudio]
type = internal/pulseaudio
format-volume = <ramp-volume> <label-volume>
label-volume = V %percentage%%
label-muted = ||
ramp-volume-0 = 
ramp-volume-1 = 
ramp-volume-2 = 
click-right = pavucontrol

[module/network]
type = custom/script
exec = iwctl station $(iwctl device list | sed 's/\x1b\[[0-9;]*m//g' | awk '/station/{print $1}' | head -1) show 2>/dev/null | grep -i "Connected network" | sed 's/.*Connected network\s*//' | sed 's/\x1b\[[0-9;]*m//g' | awk '{$1=$1;print " " $0}' || echo "󰤭 OFF"
interval = 5
click-left = /home/roi/.config/polybar/rofi-wifi-menu.sh

[module/date]
type = internal/date
interval = 5
date = %d %b
date-alt = "%Y-%m-%d"
time = %I:%M %p
time-alt = %H:%M:%S
format-prefix-foreground = ${colors.primary}
label = %time% %date%


[module/cpu]
type = internal/cpu
interval = 2
format-prefix = "CPU "
format-prefix-foreground = ${colors.primary}
label = %percentage:2%%

[module/memory]
type = internal/memory
interval = 2
format-prefix = "MEM "
format-prefix-foreground = ${colors.secondary}
label = %percentage_used:2%%

[module/powermenu]
type = custom/text
content = "POWER"
content-foreground = ${colors.alert}
click-left = /home/roi/.config/polybar/powermenu.sh

[module/rofi]
type = custom/text
content =  "Apps"
click-left = rofi -show drun

[settings]
screenchange-reload = true
pseudo-transparency = true

[module/redshift]
type = custom/script
exec = echo "EYE"
click-left = /home/roi/.config/polybar/redshift-control.sh warm
click-right = /home/roi/.config/polybar/redshift-control.sh reset
interval = 1
tail = true

[module/menu-power]
type = custom/text
content = "Power"
content-foreground = ${colors.alert}
click-left = ~/.config/polybar/powermenu.sh

[module/temperature]
type = internal/temperature
label = "T %temperature-c%"


[module/brightness]
type = custom/script
exec = echo "BR"
tail = true
interval = 1
click-left = xrandr --output DP-1 --brightness 0.35
click-right = xrandr --output DP-1 --brightness 1.0


[module/record]
type = custom/script
exec = ~/.config/polybar/record-status.sh
interval = 2
click-left = /home/roi/.config/polybar/record-toggle.sh


