# Preload wallpapers (replace with your actual image paths)
preload = ~/Pictures/wallpaper.jpg

# Set initial wallpaper for specific monitor (replace with your monitor name)
wallpaper = eDP-1,~/Pictures/wallpaper.jpg

# Other options (optional):
# IPC = on   # Enable or disable IPC control (default: off)
# blur = 0.5  # Set background blur level (0.0 to 1.0)
# filter = nearest  # Set image scaling filter (e.g., linear, nearest, cubic)

